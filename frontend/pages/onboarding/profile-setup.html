<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anvaya | Profile Setup</title>

<style>

/* RESET */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Inter', sans-serif;
}

/* BACKGROUND */
.anvaya-bg {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #ffe5ec, #ffc2d1);
    position: relative;
    overflow: hidden;
}

/* ❤️ HEARTS (NOT LINEAR) */
.hearts span {
    position: absolute;
    font-size: 18px;
    opacity: 0.2;
    animation: float 10s linear infinite;
}

.hearts span:nth-child(1) { left:10%; top:90%; }
.hearts span:nth-child(2) { left:80%; top:80%; }
.hearts span:nth-child(3) { left:30%; top:70%; }
.hearts span:nth-child(4) { left:60%; top:85%; }
.hearts span:nth-child(5) { left:50%; top:75%; }

@keyframes float {
    from { transform: translateY(100vh); }
    to { transform: translateY(-100vh); }
}

/* CARD */
.form-card {
    width: 360px;
    padding: 25px;
    border-radius: 20px;
    background: rgba(255,255,255,0.85);
    backdrop-filter: blur(12px);
    text-align: center;
}

/* TEXT */
.title {
    font-size: 20px;
    font-weight: 700;
    color: #6a1b4d;
}

.subtitle {
    font-size: 12px;
    color: #666;
    margin-bottom: 20px;
}

/* DP */
.dp-circle {
    width: 75px;
    height: 75px;
    border-radius: 50%;
    border: 2px dashed #ff4d6d;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: auto;
    cursor: pointer;
    background: white;
}

.dp-circle span {
    font-size: 24px;
    color: #ff4d6d;
}

.dp-text {
    font-size: 11px;
    color: gray;
    margin-top: 5px;
}

/* INPUT */
.input-group {
    margin-bottom: 12px;
}

input, textarea, select {
    width: 100%;
    padding: 10px;
    border-radius: 12px;
    border: 2px solid #eee;
    outline: none;
    transition: 0.3s;
}

input:focus, textarea:focus, select:focus {
    border-color: #ff4d6d;
}

textarea {
    height: 70px;
    resize: none;
}

/* INTEREST */
.interest-group {
    display: flex;
    gap: 5px;
}

.add-btn {
    background: #ff4d6d;
    color: white;
    border: none;
    padding: 10px;
    border-radius: 10px;
}

/* BUTTON */
.main-btn {
    width: 100%;
    padding: 12px;
    border-radius: 20px;
    border: none;
    background: linear-gradient(90deg, #ff4d6d, #c9184a);
    color: white;
    margin-top: 10px;
    cursor: pointer;
    transition: 0.3s;
}

.main-btn:hover {
    background: green;
}

/* SKIP */
.skip {
    margin-top: 10px;
    font-size: 12px;
    color: gray;
    cursor: pointer;
}

.dp-preview {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 50%;
}

</style>

</head>

<body>

<div class="anvaya-bg">

    <div class="hearts">
        <span>❤️</span>
        <span>❤️</span>
        <span>❤️</span>
        <span>❤️</span>
        <span>❤️</span>
    </div>

    <div class="form-card">

        <h1 class="title">Complete Your Profile</h1>
        <p class="subtitle">Let your partner know about you ❤️</p>

        <form id="profileForm">

            <!-- DP -->
            <label for="dpInput">
                <div class="dp-circle">
                    <span>+</span>
                </div>
            </label>
            <input type="file" id="dpInput" hidden>
            <p class="dp-text">Add Profile Photo</p>

            <!-- BIO -->
            <div class="input-group">
                <textarea id="bio" placeholder="Bio (Optional)"></textarea>
            </div>

            <!-- AGE -->
            <div class="input-group">
                <input type="number" id="age" placeholder="Age (Optional)">
            </div>

            <!-- INTEREST -->
            <div class="input-group interest-group">
                <input type="text" id="interests" placeholder="Add Interests">
                <button type="button" class="add-btn">Add</button>
            </div>

            <!-- LOVE -->
            <div class="input-group">
                <select id="loveLanguage">
                    <option value="">Love Language</option>
                    <option>Words 💬</option>
                    <option>Time ⏳</option>
                    <option>Gifts 🎁</option>
                    <option>Touch 🤝</option>
                    <option>Support 🛠️</option>
                </select>
            </div>

            <!-- MOOD -->
            <div class="input-group">
                <select id="moodType">
                    <option value="">Mood Type</option>
                    <option>Calm 🌙</option>
                    <option>Energetic ⚡</option>
                    <option>Emotional ❤️</option>
                    <option>Funny 😂</option>
                </select>
            </div>

            <button type="submit" class="main-btn">Continue</button>

        </form>

        <p class="skip" onclick="skipProfile()">Skip for now</p>

    </div>

</div>

<script src="../../js/config.js"></script>
<script src="../../js/onboarding/profileSetup.js"></script>

</body>
</html>
